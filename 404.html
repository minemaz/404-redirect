<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>ページが見つかりません / Page moved</title>
  <!--
    サーバ設定例:
      Apache  : ErrorDocument 404 /404.html
      Nginx   : error_page 404 /404.html;
                location = /404.html { internal; }
      この設定だと旧URLがアドレスバーに残るため、JS は location.pathname
      をそのまま「旧URL」として参照できる(外部リダイレクトではなく
      内部サブリクエストとして 404 ボディに本ファイルが返るため)。

    JSON版を使う場合:
      <script src="/redirects/redirects.js"></script>

    SQLite(sql.js / WASM)版を使う場合は↓に差し替える:
      <script src="/redirects/sql-wasm.js"></script>
      <script src="/redirects/redirects-sqlite.js"></script>
  -->
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Sans", "Yu Gothic UI", sans-serif;
      max-width: 720px; margin: 3em auto; padding: 0 1em; line-height: 1.7;
    }
    h1 { font-size: 1.4em; border-bottom: 2px solid #888; padding-bottom: .3em; }
    .panel {
      padding: 1em 1.2em; border-radius: 8px; margin: 1em 0;
      background: rgba(127,127,127,.10);
    }
    .panel.found   { background: rgba(  0,128, 64,.12); }
    .panel.missing { background: rgba(192, 64,  0,.12); }
    .target { font-weight: bold; word-break: break-all; }
    .countdown { font-variant-numeric: tabular-nums; }
    ul.suggest { list-style: none; padding-left: 0; }
    ul.suggest li { padding: .5em 0; border-bottom: 1px solid rgba(127,127,127,.2); }
    button { font: inherit; padding: .3em .9em; cursor: pointer; margin-left: .4em; }
    a { color: #0a64c8; }
    @media (prefers-color-scheme: dark) { a { color: #6cb6ff; } }
  </style>
</head>
<body>
  <h1>ページが見つかりません (404)</h1>
  <p>
    サイトのリニューアルに伴い、ご指定の URL は変更となった可能性があります。
    旧 URL を新 URL へ自動転送できるか確認しています…
  </p>

  <div id="panel" class="panel" aria-live="polite" aria-atomic="true">
    <span id="status">読み込み中…</span>
  </div>

  <div id="suggestions"></div>

  <p>
    <a href="/">トップページへ戻る</a>
    ／
    <a href="/sitemap.html">サイトマップを見る</a>
  </p>

  <noscript>
    <div class="panel missing">
      JavaScript が無効です。自動転送機能は利用できません。
      <a href="/sitemap.html">サイトマップ</a>から目的のページをお探しください。
    </div>
  </noscript>

  <script src="/redirects/redirects.js"></script>
</body>
</html>
